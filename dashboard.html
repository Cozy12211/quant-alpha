<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Alpha — 交易诊断问卷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0a0e17; --panel: #111827; --accent: #10b981; --accent2: #f59e0b;

    --blue: #3b82f6; --purple: #8b5cf6;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  header {
    background: linear-gradient(90deg, var(--accent), #059669);

  }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px; }
  .progress-bar {
    background: var(--panel); border-radius: 8px; padding: 16px; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .progress-text { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-track {
    background: #1f2937; border-radius: 4px; height: 8px; overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--accent), #34d399);
    height: 100%; border-radius: 4px; transition: width 0.3s;
    width: 0%;
  }
  .question-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px; transition: border-color 0.2s;
  }
  .question-card.answered { border-color: var(--accent); }
  .question-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .question-num {
    background: var(--accent); color: #064e3b; width: 28px; height: 28px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .question-text { font-size: 15px; font-weight: 600; }
  .question-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(59,130,246,0.15); color: #60a5fa; margin-left: auto;
  }
  .options {
    display: flex; flex-direction: column; gap: 8px;
  }
  .option {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: 8px;
    background: rgba(255,255,255,0.02); border: 1px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .option:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }
  .option.selected {
    background: rgba(16,185,129,0.1); border-color: var(--accent);
  }
  .option-radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--muted); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .option.selected .option-radio {
    border-color: var(--accent); background: var(--accent);
  }
  .option.selected .option-radio::after {
    content: '✓'; font-size: 10px; color: #064e3b; font-weight: 700;
  }
  .option-text { font-size: 13px; color: var(--text); }
  .submit-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--border);
    padding: 16px 24px; display: flex; justify-content: center; gap: 16px;
    align-items: center; z-index: 100;
  }
  .btn {
    padding: 12px 28px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent); color: #064e3b;
  }
  .btn-primary:hover { background: #34d399; }
  .btn-primary:disabled {
    background: #374151; color: var(--muted); cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
  }
  .result-panel {
    background: var(--panel); border: 1px solid var(--accent); border-radius: 12px;
    padding: 24px; margin-bottom: 80px; display: none;
  }
  .result-panel.show { display: block; }
  .result-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .result-section { margin-bottom: 16px; }
  .result-section h4 { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .result-section p { font-size: 13px; line-height: 1.8; }

let answers = {};

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = questions.map(q => `
    <div class="question-card" id="q-${q.num}" data-num="${q.num}">
      <div class="question-header">
        <div class="question-num">${q.num}</div>
        <div class="question-text">${q.text}</div>
        <div class="question-tag">${q.tag}</div>
      </div>
      <div class="options">
        ${q.options.map((opt, idx) => `
          <div class="option" data-idx="${idx}" onclick="selectOption(${q.num}, ${idx})">
            <div class="option-radio"></div>
            <div class="option-text">${opt}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectOption(qNum, idx) {
  answers[qNum] = idx;
  
  // Update UI
  const card = document.getElementById(`q-${qNum}`);
  card.classList.add('answered');
  card.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  const pct = (count / 42) * 100;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('bottom-count').textContent = count;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('submit-btn').disabled = count < 42;
}

function clearAll() {
  answers = {};
  document.querySelectorAll('.question-card').forEach(card => {
    card.classList.remove('answered');
    card.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  });
  updateProgress();
  document.getElementById('result-panel').classList.remove('show');
}

function submitAnswers() {
  const result = analyzeAnswers();
  document.getElementById('result-content').innerHTML = result;
  document.getElementById('result-panel').classList.add('show');
  document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth' });
  
  // Save to localStorage
  localStorage.setItem('quant-alpha-answers', JSON.stringify(answers));
}

function analyzeAnswers() {
  // Simple analysis logic
  const a = answers;
  
  // Determine trader type
  let type = '平衡型交易者';
  if (a[8] === 0 || a[8] === 3) type = '基本面交易者';
  if (a[8] === 1) type = '技术派交易者';
  if (a[8] === 2 || a[10] >= 3) type = '量化倾向交易者';
  if (a[7] === 0) type = '日内交易者';
  if (a[7] >= 3) type = '趋势/长线交易者';
  
  // Risk level
  let risk = '中等风险';
  if (a[5] <= 1 && a[4] <= 1) risk = '低风险偏好';
  if (a[5] >= 4 || a[4] >= 4) risk = '高风险偏好';
  
  // Automation readiness
  let auto = '需要大量学习';
  if (a[10] >= 3 && a[11] >= 1) auto = '可以快速上手量化';
  if (a[10] >= 4 && a[11] >= 2) auto = '具备量化开发能力';
  
  return `
    <div class="result-section">
      <h4>🎯 你的交易类型</h4>
      <p><strong>${type}</strong></p>
    </div>
    <div class="result-section">
      <h4>⚠️ 风险偏好</h4>
      <p>${risk} — 最大承受回撤: ${['5%以内','5-10%','10-20%','20-30%','30-50%','能接受腰斩'][a[5]] || '未填写'}</p>
    </div>
    <div class="result-section">
      <h4>🤖 量化适配度</h4>
      <p>${auto}</p>
    </div>
    <div class="result-section">
      <h4>📋 下一步建议</h4>
      <p>1. 完成数据采集框架搭建（Data-Agent）<br>
         2. 从简单的双均线策略开始回测（Strategy-Agent）<br>
         3. 建立止损规则和仓位管理（Risk-Agent）<br>
         4. 逐步增加策略复杂度，最终组合多策略运行</p>
    </div>
    <div class="result-section">
      <h4>⚡ 立即可启动的Agent</h4>
      <p>${a[10] >= 3 ? '🔬 Research-Agent + 📈 Strategy-Agent' : '💾 Data-Agent（先学基础）'}</p>
    </div>
  `;
}

// Load saved answers
const saved = localStorage.getItem('quant-alpha-answers');
if (saved) {
  answers = JSON.parse(saved);
  // Restore UI
  Object.entries(answers).forEach(([qNum, idx]) => {
    const card = document.getElementById(`q-${qNum}`);
    if (card) {
      card.classList.add('answered');
      card.querySelectorAll('.option').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
    }
  });
  updateProgress();
}

renderQuestions();
</script>
